# Tekton Chains needs push access to the Quay registry to store cosign
# signatures and in-toto attestations alongside the container images.
# The chains controller SA must have this secret linked so it can
# authenticate when uploading to the OCI registry.
---
apiVersion: v1
kind: Secret
metadata:
  name: chains-quay-push
  namespace: {{ .Values.chainsNamespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {"auths":{"{{ .Values.quay.host }}":{"auth":"{{ printf "%s:%s" .Values.quay.username .Values.quay.password | b64enc }}"}}}
