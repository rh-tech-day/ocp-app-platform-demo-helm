{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tpa-prerequisites.serviceAccountName" . }}
  labels:
    {{- include "tpa-prerequisites.labels" . | nindent 4 }}
  annotations:
    {{- include "tpa-prerequisites.argocd-syncwave" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
